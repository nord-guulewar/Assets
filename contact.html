<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Olaleye - SecOps Engineer specializing in cybersecurity solutions">
  <title>Contact - Olaleye</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-theme="dark">
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">
        <i class="fas fa-shield-alt me-2"></i>Olaleye
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="works.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link active" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="text-center mb-5">
            <h1 class="display-5 fw-bold mb-3">Let's Connect</h1>
            <p class="lead">Ready to discuss your cybersecurity needs or explore collaboration opportunities</p>
          </div>

          <div class="row g-5">
            <!-- Contact Form -->
            <div class="col-lg-7">
              <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                  <h3 class="card-title mb-4">Send a Message</h3>
                  <form id="contactForm">
                    <div class="mb-3">
                      <label for="name" class="form-label fw-semibold">Full Name</label>
                      <input type="text" id="name" name="name" class="form-control form-control-lg" placeholder="Your name" required>
                    </div>
                    <div class="mb-3">
                      <label for="email" class="form-label fw-semibold">Email Address</label>
                      <input type="email" id="email" name="email" class="form-control form-control-lg" placeholder="your.email@example.com" required>
                    </div>
                    <div class="mb-4">
                      <label for="message" class="form-label fw-semibold">Message</label>
                      <textarea id="message" name="message" class="form-control form-control-lg" rows="5" placeholder="Tell me about your project or inquiry..." required></textarea>
                    </div>
                    <div class="d-grid">
                      <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-paper-plane me-2"></i>Send Message
                      </button>
                    </div>
                  </form>
                  <div id="formMessage" class="mt-3 text-center"></div>
                </div>
              </div>
            </div>

            <!-- Contact Info -->
            <div class="col-lg-5">
              <div class="mb-4">
                <h4 class="mb-4">Get In Touch</h4>
                <div class="d-flex align-items-center justify-content-center mb-3">
                  <a href="mailto:olaleyelekanjoseph@gmail.com" class="social-link">
                    <img src="icons/email.svg" alt="Email" class="social-icon">
                  </a>
                </div>
                <div class="d-flex align-items-center justify-content-center mb-3">
                  <a href="https://github.com/nord-guulewar/mywebsite_portfolio" target="_blank" class="social-link">
                    <img src="icons/github.svg" alt="GitHub" class="social-icon">
                  </a>
                </div>
                <div class="d-flex align-items-center justify-content-center mb-3">
                  <a href="https://x.com/OmoObaAderopo" target="_blank" class="social-link">
                    <img src="icons/twitter.svg" alt="Twitter" class="social-icon">
                  </a>
                </div>
                <div class="d-flex align-items-center justify-content-center">
                  <a href="https://instagram.com/aderopoola" target="_blank" class="social-link">
                    <img src="icons/instagram.svg" alt="Instagram" class="social-icon">
                  </a>
                </div>
              </div>

              <div class="card border-0 shadow-sm bg-light">
                <div class="card-body text-center">
                  <i class="fas fa-clock fa-3x text-warning mb-3"></i>
                  <h5>Response Time</h5>
                  <p class="mb-0">I typically respond within 24 hours</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Olaleye. Securing the digital world, one solution at a time.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
