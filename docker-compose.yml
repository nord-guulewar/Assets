version: '3.8'

services:
  # Network Vulnerability Scanner (Port 5000)
  network-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scanner_backend.py
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Log Analysis Tool (Port 5001)
  log-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python log-analyzer-backend.py
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Password Strength Analyzer (Port 5002)
  password-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python password-analyzer-backend.py
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=production
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SSL/TLS Certificate Checker (Port 5003)
  ssl-checker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python ssl-checker-backend.py
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=production
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # File Integrity Monitor (Port 5004)
  file-integrity-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    command: python file-integrity-backend.py
    ports:
      - "5004:5004"
    environment:
      - FLASK_ENV=production
    volumes:
      - .:/app
      - /tmp:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - Nginx serving static files
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html
    depends_on:
      - network-scanner
      - log-analyzer
      - password-analyzer
      - ssl-checker
      - file-integrity-monitor
    restart: unless-stopped

networks:
  default:
    driver: bridge